<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SKBP Wiki Note</title>
    <script>
      (() => {
        const stored = localStorage.getItem('skbp.ui.theme');
        const theme = stored || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="app-shell wiki-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">SKBP Pipeline Finder</p>
          <h1 id="wikiTitle">Wiki</h1>
        </div>
        <div class="top-actions">
          <a class="secondary-link" href="/">Dashboard</a>
          <button class="theme-toggle" data-theme-toggle type="button" aria-label="라이트/다크 모드 전환">
            <span data-theme-icon aria-hidden="true">◐</span>
            <span data-theme-label>Dark</span>
          </button>
          <a class="secondary-link" id="rawWikiLink" href="#" target="_blank" rel="noreferrer"><span aria-hidden="true">↗</span><b>Raw MD</b></a>
          <span class="status-pill" id="wikiStatus">Loading</span>
        </div>
      </header>

      <main class="wiki-layout">
        <section class="panel wiki-note-panel">
          <div class="panel-header">
            <div>
              <h2 id="wikiNoteTitle">Loading</h2>
              <p id="wikiNotePath">-</p>
            </div>
          </div>
          <article id="wikiNoteContent" class="wiki-note-content"></article>
        </section>
      </main>
    </div>

    <script type="module" src="./src/wiki_view.js"></script>
  </body>
</html>
